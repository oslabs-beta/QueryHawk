# Simple Mimir configuration for QueryHawk
multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095

distributor:
  ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    kvstore:
      store: memberlist

compactor:
  sharding_ring:
    kvstore:
      store: memberlist

store_gateway:
  sharding_ring:
    kvstore:
      store: memberlist

ruler:
  ring:
    kvstore:
      store: memberlist

alertmanager:
  sharding_ring:
    kvstore:
      store: memberlist

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir

limits:
  max_global_series_per_user: 1000000
  max_global_series_per_metric: 100000
