server:
  log_level: info
  http_listen_port: 12345
  grpc_listen_port: 12346

metrics:
  global:
    scrape_interval: 15s
    evaluation_interval: 15s
    external_labels:
      cluster: queryhawk
      environment: development

  configs:
    - name: default
      scrape_configs:
        # Self-monitoring
        - job_name: 'alloy'
          static_configs:
            - targets: ['localhost:12345']
          metrics_path: /metrics
          scrape_interval: 15s

        # QueryHawk backend metrics
        - job_name: 'queryhawk-backend'
          static_configs:
            - targets: ['backend:4002']
          metrics_path: /metrics
          scrape_interval: 15s

        # PostgreSQL monitoring (dynamic targets)
        - job_name: 'postgresql-users'
          file_sd_configs:
            - files:
                - '/etc/alloy/targets/*.json'
                - './targets/*.json'
          metrics_path: /metrics
          scrape_interval: 15s
          scrape_timeout: 10s
          honor_labels: true
          relabel_configs:
            - source_labels: [__address__]
              target_label: instance
            - source_labels: [user_id]
              target_label: user_id
            - source_labels: [database]
              target_label: database_type

      remote_write:
        - url: http://grafana:3000/api/v1/write
          basic_auth:
            username: admin
            password: admin

traces:
  configs:
    - name: default
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      
      processors:
        - batch:
            timeout: 1s
            send_batch_size: 1024
        - attributes:
            actions:
              # Remove sensitive data but keep query analysis context
              - key: http.request.header.authorization
                action: delete
              - key: db.statement
                action: hash  # Hash instead of delete for query correlation
              # Add QueryHawk-specific attributes
              - key: queryhawk.service
                value: "query-analyzer"
                action: insert
              - key: queryhawk.version
                value: "2.0.0"
                action: insert
        - resource:
            attributes:
              - key: service.namespace
                value: "queryhawk"
                action: insert
              - key: deployment.environment
                value: "development"
                action: insert
      
      exporters:
        - otlp:
            endpoint: http://grafana:3000/api/v1/traces
            tls:
              insecure: true
            headers:
              X-Scope-OrgID: "1"

logs:
  configs:
    - name: default
      clients:
        - url: http://grafana:3000/api/v1/push
          basic_auth:
            username: admin
            password: admin

      positions:
        filename: /tmp/positions.yaml

      scrape_configs:
        - job_name: queryhawk-logs
          static_configs:
            - targets:
                - localhost
              labels:
                job: queryhawk
                __path__: /var/log/queryhawk/*.log
